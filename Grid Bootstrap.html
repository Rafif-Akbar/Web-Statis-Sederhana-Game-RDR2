<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Grid Dalam Bootstrap</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #e0e0e0;
}

.wrapper {
    background-color: #3498db;
    border: 3px solid #1f5f8b;
    padding: 15px;
}

.box {
    background-color: #3498db;
    border: 2px solid #1f5f8b;
    color: white;
    text-align: center;
    padding: 15px 0;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container mt-4">
    <h3 class="text-center mb-3">Grid Dalam Bootstrap</h3>

    <div class="wrapper">

        <div class="row g-0 mb-2">
            <div class="col-12 box">col-12</div>
        </div>

        <div class="row g-0 mb-2">
            <div class="col-6 box">col-6</div>
            <div class="col-6 box">col-6</div>
        </div>

        <div class="row g-0 mb-2">
            <div class="col-4 box">col-4</div>
            <div class="col-4 box">col-4</div>
            <div class="col-4 box">col-4</div>
        </div>

        <div class="row g-0 mb-2">
            <div class="col-2 box">col-2</div>
            <div class="col-2 box">col-2</div>
            <div class="col-2 box">col-2</div>
            <div class="col-2 box">col-2</div>
            <div class="col-2 box">col-2</div>
            <div class="col-2 box">col-2</div>
        </div>

        <div class="row g-0 mb-2">
            <div class="col box">col</div>
            <div class="col box">col</div>
            <div class="col box">col</div>
            <div class="col box">col</div>
            <div class="col box">col</div>
            <div class="col box">col</div>
        </div>

        <div class="row g-0 mb-2">
            <div class="col-8 box">col-8</div>
            <div class="col-4 box">col-4</div>
        </div>

        <div class="row g-0">
            <div class="col-4 box">col-4</div>
            <div class="col-2 box">col-2</div>
            <div class="col-2 box">col-2</div>
            <div class="col-4 box">col-4</div>
        </div>

    </div>
</div>

</body>
</html>
